<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함께할개 - 입양 프로젝트</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- 헤더 -->
    <header class="header">
<!--      <i class="fa-solid fa-bars menu-icon"></i>-->
      <h1 class="logo">🐾복댕이네 쉼터</h1>
<!--      <i class="fa-regular fa-heart heart-icon"></i>-->
    </header>

    <main>
      <!-- 히어로 섹션 -->
      <section class="hero">
        <div class="hero-content">
          <p class="hero-subline">평생의 가족을 기다려요💚</p>
          <h2 class="hero-title">
            11마리의 아이들이<br /><span class="highlight">새로운 가족</span>을
            기다립니다
          </h2>
          <p class="hero-desc">사랑으로 안아주세요,<br />기적이 시작됩니다.</p>
        </div>
        <div class="hero-image">
          <img
            src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee?q=80&w=500"
            alt="메인 강아지"
          />
        </div>
      </section>

      <!-- 필터 영역 -->
      <section class="filter-container">
        <div class="dropdown">
          <button class="dropbtn">
            <i class="fa-solid fa-sliders"></i> 전체 보기
            <i class="fa-solid fa-chevron-down"></i>
          </button>
        </div>
        <span class="total-count">총 11마리</span>
      </section>

      <!-- 강아지 리스트 (JS에서 동적 생성) -->
      <section class="dog-grid" id="dogGrid">
        <!-- 카드가 여기에 삽입됩니다 -->
      </section>

      <!-- 하단 CTA 카드 -->
      <section class="cta-section">
        <div class="cta-card">
          <div class="cta-icon">🏠</div>
          <h3>입양은 사랑입니다</h3>
          <p>끝까지 책임질 수 있는<br />따뜻한 가족이 되어주세요.</p>
          <button
            class="cta-button"
            onclick="alert('입양 절차 안내 페이지로 이동합니다')"
          >
            입양 절차 안내 <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </section>

      <!-- 하단 안내 문구 -->
      <footer class="info-footer">
        <div class="info-box">
          <i class="fa-solid fa-shield-dog"></i>
          <p>
            모든 아이들은 건강검진과 예방접종을 완료했어요.<br />입양 전 충분한
            상담을 통해 신중히 결정해주세요.
          </p>
        </div>
      </footer>
    </main>

    <!-- 모달 팝업 -->
    <div id="dogModal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody">
          <!-- 상세 정보가 여기에 삽입됩니다 -->
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
