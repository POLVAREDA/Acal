<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>복댕이네 쉼터 - 입양 프로젝트</title>
    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* 기본 설정 */
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css");
      :root {
        --primary-color: #006327;
        --bg-color: #fafaf6;
        --white: #ffffff;
        --text-main: #333333;
        --text-sub: #666666;
        --card-radius: 12px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.5;
      }

      /* 헤더 */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: var(--white);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-size: 1.2rem;
        color: var(--primary-color);
        font-weight: 800;
      }

      /* 히어로 섹션 */
      .hero {
        display: flex;
        padding: 30px 20px;
        background-color: #f3f6ee;
        align-items: center;
        overflow: hidden;
      }

      .hero-content {
        flex: 1;
      }

      .hero-subline {
        font-size: 0.85rem;
        margin-bottom: 5px;
      }

      .hero-title {
        font-size: 1.4rem;
        margin-bottom: 15px;
        line-height: 1.3;
      }

      .highlight {
        color: var(--primary-color);
      }

      .hero-desc {
        font-size: 0.9rem;
        color: var(--text-sub);
      }

      .hero-image {
        flex: 1;
        display: flex;
        justify-content: flex-end;
      }

      .hero-image img {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        object-fit: cover;
      }

      /* 필터 영역 */
      .filter-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
      }

      .total-count {
        font-size: 0.85rem;
        color: var(--text-sub);
      }

      /* 강아지 리스트 그리드 */
      .dog-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 0 20px 30px 20px;
      }

      .dog-card {
        background: var(--white);
        border-radius: var(--card-radius);
        overflow: hidden;
        position: relative;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        cursor: pointer;
        transition: transform 0.2s;
      }

      .dog-card:active {
        transform: scale(0.98);
      }

      .badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: var(--primary-color);
        color: white;
        padding: 2px 8px;
        border-radius: 5px;
        font-size: 0.75rem;
        font-weight: bold;
      }

      .dog-card img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
      }

      .dog-info {
        padding: 12px;
      }

      .dog-name {
        font-weight: bold;
        font-size: 1rem;
        margin-bottom: 4px;
      }

      .gender-m {
        color: #2196f3;
      }
      .gender-f {
        color: #f44336;
      }

      .dog-meta {
        font-size: 0.8rem;
        color: var(--text-sub);
        margin-bottom: 10px;
      }

      .tag-container {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      .tag {
        background: #f0f7eb;
        color: var(--primary-color);
        font-size: 0.7rem;
        padding: 3px 8px;
        border-radius: 20px;
      }

      /* CTA 카드 */
      .cta-section {
        padding: 0 20px 30px 20px;
      }
      .cta-card {
        background: #f9fdf6;
        border: 1px solid #eef5e8;
        border-radius: var(--card-radius);
        padding: 30px;
        text-align: center;
      }
      .cta-icon {
        font-size: 2rem;
        margin-bottom: 10px;
      }
      .cta-card h3 {
        margin-bottom: 10px;
        color: var(--primary-color);
      }
      .cta-card p {
        font-size: 0.9rem;
        color: var(--text-sub);
        margin-bottom: 20px;
      }
      .cta-button {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        font-weight: bold;
        width: 100%;
        cursor: pointer;
      }

      /* 모달 [중앙 정렬 수정] */
      .modal {
        display: none; /* 초기값 */
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);

        /* 중앙 정렬 핵심 속성 */
        align-items: center;
        justify-content: center;
      }

      /* JS에서 'show' 클래스를 붙였을 때만 보임 */
      .modal.show {
        display: flex;
      }

      .modal-content {
        background-color: white;
        padding: 20px;
        width: 90%;
        max-width: 450px;
        border-radius: 15px;
        position: relative;

        /* 내부 스크롤 허용 */
        max-height: 85vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      body.no-scroll {
        overflow: hidden;
      }

      .close-modal {
        position: absolute;
        right: 15px;
        top: 10px;
        font-size: 28px;
        cursor: pointer;
        z-index: 10;
      }

      .modal-img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      /* 하단 안내 */
      .info-footer {
        padding: 20px;
        border-top: 1px solid #eee;
      }
      .info-box {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.75rem;
        color: var(--text-sub);
      }

      /* 반응형 */
      @media (min-width: 768px) {
        .dog-grid {
          grid-template-columns: repeat(3, 1fr);
          max-width: 900px;
          margin: 0 auto;
        }
        .hero {
          padding: 50px 10%;
        }
      }
    </style>
  </head>

  <body>
    <header class="header">
      <h1 class="logo">🐾 복댕이네 쉼터</h1>
    </header>

    <main>
      <section class="hero">
        <div class="hero-content">
          <p class="hero-subline">평생의 가족을 기다려요💚</p>
          <h2 class="hero-title">
            11마리의 아이들이<br /><span class="highlight">새로운 가족</span>을
            기다립니다
          </h2>
          <p class="hero-desc">사랑으로 안아주세요,<br />기적이 시작됩니다.</p>
        </div>
        <div class="hero-image">
          <img
            src="https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134571/KakaoTalk_20260507_151421483_wzamhz.jpg"
            alt="메인 강아지"
          />
        </div>
      </section>

      <section class="filter-container">
        <div class="dropdown"></div>
        <span class="total-count">총 11마리</span>
      </section>

      <section class="dog-grid" id="dogGrid"></section>

      <section class="cta-section">
        <div class="cta-card">
          <div class="cta-icon">🏠</div>
          <h3>입양은 사랑입니다</h3>
          <p>끝까지 책임질 수 있는<br />따뜻한 가족이 되어주세요.</p>
          <button
            class="cta-button"
            onclick="alert('입양 절차 안내 페이지로 이동합니다')"
          >
            입양 절차 안내 <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </section>

      <footer class="info-footer">
        <div class="info-box">
          <i class="fa-solid fa-shield-dog"></i>
          <p>
            모든 아이들은 건강검진과 예방접종을 완료했어요.<br />입양 전 충분한
            상담을 통해 신중히 결정해주세요.
          </p>
        </div>
      </footer>
    </main>

    <div id="dogModal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      const dogs = [
        {
          id: 1,
          name: "호두",
          gender: "M",
          age: 5,
          weight: 25,
          tags: ["활발해요", "사람좋아"],
          desc: "에너지가 넘치는 호두는 처음 보는 사람에게도 꼬리를 흔들며 다가가는 사교성 끝판왕이에요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134982/KakaoTalk_20260507_151421483_04_ekodaq.jpg",
        },
        {
          id: 2,
          name: "여름",
          gender: "F",
          age: 2,
          weight: 18,
          tags: ["순해요", "애교많아요"],
          desc: "순하고 애교많아서 친구들에게 양보도 잘하는 천사표! 겁이 많아 첫 만남은 경계해요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778135339/KakaoTalk_20260507_151421483_11_kn0wqv.jpg",
        },
        {
          id: 3,
          name: "햇님",
          gender: "F",
          age: 2,
          weight: 18,
          tags: ["호기심이 많아요", "겁이 있어요"],
          desc: "엉뚱하고 호기심이 왕성해요. 겁은 조금 있지만, 마음을 열면 애교가 무척 많은 아이예요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778135438/KakaoTalk_20260506_231341080_nzdscx.jpg",
        },
        {
          id: 4,
          name: "쭈쭈",
          gender: "M",
          age: 5,
          weight: 20,
          tags: ["순해요", "고집있어요"],
          desc: "듬직한 체구와 달리 성격이 점잖고 온순해요. 사람만 바라보는 해바라기 같은 아이.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778135011/KakaoTalk_20260507_151421483_13_itcdqk.jpg",
        },
        {
          id: 5,
          name: "마마",
          gender: "F",
          age: 6,
          weight: 5.1,
          tags: ["온순해요", "사람좋아"],
          desc: "공격성이 전혀 없는 온순한 성격의 마마는 어린 아이가 있는 가정에도 아주 잘 어울려요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778135434/KakaoTalk_20260507_150757274_vopjub.jpg",
        },
        {
          id: 6,
          name: "알밤",
          gender: "M",
          age: 3,
          weight: 20,
          tags: ["낯가림 있어요", "순해요"],
          desc: "낯가림은 있지만 애교 많고 순해요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778076935/Gemini_Generated_Image_m591hlm591hlm591_gaadio.png",
        },
        {
          id: 7,
          name: "장군이",
          gender: "M",
          age: 0,
          weight: 26,
          tags: ["겁이 많아요", "토실 뚱땅이"],
          desc: "사람이 무서운 아이예요. 천천히 마음을 열고 있는 중이라 오래 본 사람에게 손을 허락한답니다.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134969/KakaoTalk_20260507_151421483_21_og4zo2.jpg",
        },
        {
          id: 8,
          name: "순돌이",
          gender: "M",
          age: 5,
          weight: 18,
          tags: ["겁이 많아요", "강아지 인싸"],
          desc: "사람에게는 겁이 많지만, 친구들과 놀 땐 한없이 천진난만!",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134993/KakaoTalk_20260507_151421483_12_egrow4.jpg",
        },
        {
          id: 9,
          name: "탄밤",
          gender: "M",
          age: 3,
          weight: 20,
          tags: ["애교많아요", "장난꾸러기"],
          desc: "중력 거부 용수철, 활어견. 애교가 많고 에너지가 넘쳐요. 개보다는 사람을 좋아해요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134974/KakaoTalk_20260507_151421483_24_hef2tk.jpg",
        },
        {
          id: 10,
          name: "달님이",
          gender: "F",
          age: 2,
          weight: 18,
          tags: ["영리해요", "간식을 좋아해요"],
          desc: "영리하고 눈치가 빠른 달님이는 마음을 연 사람에게만 애교를 허락하는 도도하고 특별한 아이.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778076935/Gemini_Generated_Image_m591hlm591hlm591_gaadio.png",
        },
        {
          id: 11,
          name: "별이",
          gender: "F",
          age: 2,
          weight: 18,
          tags: ["사람좋아", "애교많아요"],
          desc: "유별난 매력, 말썽도 곧잘 부리지만 낯가림이 전혀 없어 처음 본 사람에게도 장난감을 물어다 줄만큼 활기차요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778076935/Gemini_Generated_Image_m591hlm591hlm591_gaadio.png",
        },
      ];
      function renderDogCards() {
        const grid = document.getElementById("dogGrid");
        if (!grid) return;

        dogs.forEach((dog) => {
          const genderIcon =
            dog.gender === "M"
              ? '<i class="fa-solid fa-mars gender-m"></i>'
              : '<i class="fa-solid fa-venus gender-f"></i>';

          const card = document.createElement("div");
          card.className = "dog-card";
          card.innerHTML = `
            <span class="badge">${dog.id}</span>
            <img src="${dog.image}" alt="${dog.name}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
            <div class="dog-info">
                <div class="dog-name">${dog.name} ${genderIcon}</div>
                <div class="dog-meta">약 ${dog.age}살 · ${dog.weight}kg</div>
                <div class="tag-container">
                    ${dog.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
                </div>
            </div>
          `;
          card.onclick = () => openModal(dog);
          grid.appendChild(card);
        });
      }

      const modal = document.getElementById("dogModal");
      const closeModal = document.querySelector(".close-modal");

      function openModal(dog) {
        const modalBody = document.getElementById("modalBody");
        const genderText = dog.gender === "M" ? "남아" : "여아";

        modalBody.innerHTML = `
          <img src="${dog.image}" class="modal-img" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
          <h2 style="margin-bottom:10px">${dog.name} (${genderText})</h2>
          <p style="color:#666; margin-bottom:15px">나이: ${dog.age}살 추정 | 몸무게: 약 ${dog.weight}kg</p>
          <div class="tag-container" style="display:flex; gap:5px; flex-wrap:wrap;">
              ${dog.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
          <div class="modal-desc" style="margin-top:20px; padding:15px; background:#f9f9f9; border-radius:10px;">
              <p style="font-size:0.95rem; line-height:1.6; color:#333; font-weight:500;">"${dog.desc}"</p>
              <p style="margin-top:10px; font-size:0.85rem; color:#666;">현재 새로운 가족의 따뜻한 사랑을 기다리고 있습니다.</p>
              <p style="margin-top:10px; font-size:0.85rem; color:#999; line-height:1.6;">
                  입양은 한 생명을 끝까지 책임지는 소중한 약속입니다. 아이의 성격과 특징을 잘 살펴주시고 신중한 결정을 부탁드립니다.
              </p>
          </div>
        `;

        // 클래스를 추가하여 중앙 정렬(Flex) 적용 및 스크롤 방지
        modal.classList.add("show");
        document.body.classList.add("no-scroll");

        const modalContent = document.querySelector(".modal-content");
        if (modalContent) modalContent.scrollTop = 0;
      }

      function closeModalWindow() {
        modal.classList.remove("show");
        document.body.classList.remove("no-scroll");
      }

      if (closeModal) {
        closeModal.onclick = closeModalWindow;
      }

      window.onclick = (event) => {
        if (event.target == modal) {
          closeModalWindow();
        }
      };

      document.addEventListener("DOMContentLoaded", renderDogCards);
    </script>
  </body>
</html>
