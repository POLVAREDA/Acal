<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>복댕이네 쉼터 - 입양하기</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap");

      :root {
        --primary-color: #1a4d2e;
        --bg-light: #f1f5f1;
        --text-gray: #777;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Noto Sans KR", sans-serif;
        background-color: #f8f9fa;
        color: #333;
        line-height: 1.5;
      }
      body.no-scroll {
        overflow: hidden;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        min-height: 100vh;
        position: relative;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      }

      /* 히어로 섹션 */
      .hero {
        background: var(--bg-light);
        padding: 40px 24px 80px 24px;
        border-radius: 0 0 40px 40px;
        position: relative;
        overflow: hidden;
      }
      .logo {
        color: var(--primary-color);
        font-weight: 800;
        font-size: 20px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hero h1 {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 10px;
        line-height: 1.3;
        position: relative;
        z-index: 2;
      }
      .hero h1 span {
        color: var(--primary-color);
      }
      .hero p {
        font-size: 14px;
        color: var(--text-gray);
        position: relative;
        z-index: 2;
      }
      .hero-img {
        position: absolute;
        right: -30px;
        bottom: -20px;
        width: 180px;
        height: 200px;
        border-radius: 60%;
        object-fit: cover;
        z-index: 1;
      }

      /* 통계 카드 */
      .stats {
        margin: -40px 24px 0;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 24px;
        display: flex;
        justify-content: space-around;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        position: relative;
        z-index: 5;
      }
      .stat-item {
        text-align: center;
        flex: 1;
      }
      .stat-item i {
        color: #a8c69f;
        font-size: 20px;
        margin-bottom: 5px;
        display: block;
      }
      .stat-item .val {
        font-weight: 700;
        display: block;
        font-size: 14px;
      }
      .stat-item .lbl {
        font-size: 10px;
        color: #aaa;
      }

      /* 메인 리스트 */
      .main-content {
        padding: 40px 24px;
      }
      .list-title {
        font-weight: 700;
        margin-bottom: 20px;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .list-title span {
        color: #ccc;
        font-weight: 400;
        font-size: 14px;
      }

      /* 카드 그리드 */
      .dog-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .dog-card {
        background: white;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid #f0f0f0;
        cursor: pointer;
        transition: transform 0.2s;
        position: relative;
      }
      .dog-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      }
      .dog-card .badge {
        position: absolute;
        top: 12px;
        left: 12px;
        background: var(--primary-color);
        color: white;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: bold;
        z-index: 2;
      }
      .dog-card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
      }
      .dog-info {
        padding: 15px;
      }
      .dog-name {
        font-weight: 700;
        font-size: 17px;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .gender-m {
        color: #3b82f6;
      }
      .gender-f {
        color: #ec4899;
      }
      .dog-meta {
        font-size: 11px;
        color: #aaa;
        margin: 4px 0 10px;
      }
      .tag-container {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .tag {
        font-size: 10px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 6px;
        background: #f1f8e9;
        color: #2e7d32;
        border: 1px solid #e8f5e9;
      }

      /* 모달 스타일 */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }
      .modal.show {
        display: flex;
      }
      .modal-content {
        background: white;
        width: 100%;
        max-width: 450px;
        max-height: 90vh;
        border-radius: 30px;
        overflow-y: auto;
        position: relative;
        animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp {
        from {
          transform: translateY(30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .close-modal {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 18px;
        color: white;
        background: rgba(0, 0, 0, 0.4);
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 20;
      }

      .modal-img {
        width: 100%;
        max-height: 45vh;
        object-fit: cover;
        display: block;
      }
      .modal-body {
        padding: 25px;
      }
      .modal-desc {
        line-height: 1.7;
        color: #444;
        font-size: 14px;
        background: #f8f9fa;
        padding: 18px;
        border-radius: 18px;
        margin-top: 15px;
        word-break: keep-all;
      }

      .status-badge {
        background: #f1f8e9;
        color: #2e7d32;
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: bold;
      }

      /* 하단 배너 */
      .bottom-banner {
        margin-top: 30px;
        background: #fdfdf3;
        padding: 15px;
        border-radius: 20px;
        border: 1px solid #f0f0e0;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .banner-icon {
        width: 40px;
        height: 40px;
        background: white;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #eee;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <div class="logo"><i class="fas fa-home"></i> 복댕이네 쉼터</div>
        <p style="font-weight: 500; margin-bottom: 5px">
          평생의 가족을 기다려요 💚
        </p>
        <h1><span>10마리</span>의 아이들이<br />새로운 가족을 기다립니다</h1>
        <div
          style="
            display: flex;
            gap: 10px;
            margin-top: 20px;
            position: relative;
            z-index: 2;
          "
        >
          <a
            href="https://linktr.ee/bokdaengs"
            style="
              display: inline-block;
              text-decoration: none;
              background: var(--primary-color);
              color: white;
              border: none;
              padding: 12px 22px;
              border-radius: 12px;
              font-weight: bold;
              font-size: 14px;
              cursor: pointer;
              text-align: center;
            "
          >
            입양하기
          </a>

          <!-- 쉼터 소개 링크 버튼 -->
          <a
            href="https://linktr.ee/bokdaengs"
            style="
              display: inline-block;
              text-decoration: none;
              background: white;
              color: var(--primary-color);
              border: 1px solid var(--primary-color);
              padding: 12px 22px;
              border-radius: 12px;
              font-weight: bold;
              font-size: 14px;
              cursor: pointer;
              text-align: center;
            "
          >
            쉼터 소개
          </a>
        </div>
        <img
          src="https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134571/KakaoTalk_20260507_151421483_wzamhz.jpg"
          class="hero-img"
        />
      </header>

      <section class="stats">
        <div class="stat-item">
          <i class="fas fa-paw"></i>
          <span class="lbl">보호중</span>
          <span class="val">10마리</span>
        </div>
        <div class="stat-item">
          <i class="fas fa-heart"></i>
          <span class="lbl">입양완료</span>
          <span class="val">5마리</span>
        </div>
        <div class="stat-item">
          <i class="far fa-calendar-alt"></i>
          <span class="lbl">함께한 기간</span>
          <span class="val">1년 2개월</span>
        </div>
      </section>

      <main class="main-content">
        <div class="list-title">
          <i class="fas fa-dog" style="color: var(--primary-color)"></i> 입양
          가능한 아이들 <span>총 10마리</span>
        </div>
        <div class="dog-grid" id="dogGrid"></div>

        <div class="bottom-banner">
          <div class="banner-icon">🏠</div>
          <div style="flex: 1">
            <p style="font-weight: bold; font-size: 13px">
              작은 관심이 큰 변화를 만듭니다
            </p>
            <p style="font-size: 10px; color: #999">마음을 나누어주세요</p>
          </div>
          <a
            href="https://aq.gy/f/dClVp"
            style="
              text-decoration: none;
              background: var(--primary-color);
              color: white;
              padding: 8px 14px;
              border-radius: 10px;
              font-size: 11px;
              font-weight: bold;
            "
            >후원하기</a
          >
        </div>
      </main>
    </div>

    <div id="dogModal" class="modal">
      <div class="modal-content">
        <span class="close-modal" id="closeBtn">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      const dogs = [
        {
          id: 1,
          name: "호두",
          gender: "M",
          age: 5,
          weight: 23,
          tags: ["활발해요", "사람좋아"],
          desc: "에너지가 넘치는 호두는 처음 보는 사람에게도 꼬리를 흔들며 다가가는 사교성 끝판왕이에요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134982/KakaoTalk_20260507_151421483_04_ekodaq.jpg",
          status: ["입양가능", "임보가능"], // 상태 정보 추가
        },
        {
          id: 2,
          name: "여름",
          gender: "F",
          age: 2,
          weight: 16,
          tags: ["순해요", "애교많아요"],
          desc: "순하고 애교많아서 친구들에게 양보도 잘하는 천사표! 겁이 많아 첫 만남은 경계해요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778135831/8_lsse4o.jpg",
          status: ["입양가능", "임보가능"],
        },
        {
          id: 3,
          name: "햇님",
          gender: "F",
          age: 2,
          weight: 16,
          tags: ["호기심이 많아요", "겁이 있어요"],
          desc: "엉뚱하고 호기심이 왕성해요. 겁은 조금 있지만, 마음을 열면 애교가 무척 많은 아이예요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778135761/7_daya8i.jpg",
          status: ["입양가능", "임보가능"],
        },
        {
          id: 4,
          name: "쭈쭈",
          gender: "M",
          age: 5,
          weight: 22,
          tags: ["순해요", "고집있어요"],
          desc: "듬직한 체구와 달리 성격이 점잖고 온순해요. 사람만 바라보는 해바라기 같은 아이.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778135011/KakaoTalk_20260507_151421483_13_itcdqk.jpg",
          status: ["입양가능", "임보가능"],
        },
        {
          id: 5,
          name: "마마💮",
          gender: "F",
          age: 6,
          weight: 21,
          tags: ["영면에 들었어요"],
          desc: "마마, 이제 아프지 않고 행복하게 뛰어놀길.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778144487/KakaoTalk_20260507_180000633_kivfpk.jpg",
          status: [],
        },
        {
          id: 6,
          name: "알밤",
          gender: "M",
          age: 3,
          weight: 20,
          tags: ["낯가림 있어요", "순해요"],
          desc: "낯가림은 있지만 애교 많고 순해요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778496391/KakaoTalk_20260509_093931292_03_ecvvo2.jpg",
          status: ["입양가능", "임보가능"],
        },
        {
          id: 7,
          name: "장군이",
          gender: "M",
          age: 0,
          weight: 26,
          tags: ["겁이 많아요", "토실 뚱땅이"],
          desc: "사람이 무서운 아이예요. 천천히 마음을 열고 있는 중이라 오래 본 사람에게 손을 허락한답니다.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134969/KakaoTalk_20260507_151421483_21_og4zo2.jpg",
          status: ["입양가능"],
        },
        {
          id: 8,
          name: "순돌이",
          gender: "M",
          age: 5,
          weight: 18,
          tags: ["겁이 많아요", "강아지 인싸"],
          desc: "사람에게는 겁이 많지만, 친구들과 놀 땐 한없이 천진난만!",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134993/KakaoTalk_20260507_151421483_12_egrow4.jpg",
          status: ["입양가능"],
        },
        {
          id: 9,
          name: "탄밤",
          gender: "M",
          age: 3,
          weight: 19,
          tags: ["애교많아요", "장난꾸러기"],
          desc: "중력 거부 용수철, 활어견. 애교가 많고 에너지가 넘쳐요. 개보다는 사람을 좋아해요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778134974/KakaoTalk_20260507_151421483_24_hef2tk.jpg",
          status: ["입양가능", "임보가능"],
        },
        {
          id: 10,
          name: "달님",
          gender: "F",
          age: 2,
          weight: 16,
          tags: ["영리해요", "간식을 좋아해요"],
          desc: "영리하고 눈치가 빠른 달님이는 마음을 연 사람에게만 애교를 허락하는 도도하고 특별한 아이.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778136373/KakaoTalk_20260507_154522577_04_ezajrf.jpg",
          status: ["입양가능", "임보가능"],
        },
        {
          id: 11,
          name: "별이",
          gender: "F",
          age: 2,
          weight: 16,
          tags: ["사람좋아", "애교많아요"],
          desc: "유별난 매력, 말썽도 곧잘 부리지만 낯가림이 전혀 없어 처음 본 사람에게도 장난감을 물어다 줄만큼 활기차요.",
          image:
            "https://res.cloudinary.com/dkqqxjsek/image/upload/v1778136436/KakaoTalk_20260507_151421483_09_gu7cmt.jpg",
          status: ["입양가능", "임보가능"],
        },
      ];

      const grid = document.getElementById("dogGrid");
      const modal = document.getElementById("dogModal");
      const modalBody = document.getElementById("modalBody");
      const closeBtn = document.getElementById("closeBtn");

      function renderCards() {
        dogs.forEach((dog) => {
          const genderIcon =
            dog.gender === "M"
              ? '<i class="fa-solid fa-mars gender-m"></i>'
              : '<i class="fa-solid fa-venus gender-f"></i>';
          const card = document.createElement("div");
          card.className = "dog-card";
          card.innerHTML = `
                <span class="badge">${dog.id}</span>
                <img src="${dog.image}" alt="${dog.name}" onerror="this.src='https://via.placeholder.com/300?text=Dog'">
                <div class="dog-info">
                    <div class="dog-name">${dog.name} ${genderIcon}</div>
                    <div class="dog-meta">${dog.age === 0 ? "1살 미만" : "약 " + dog.age + "살"} · ${dog.weight}kg</div>
                    <div class="tag-container">
                        ${dog.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
                    </div>
                </div>
            `;
          card.onclick = () => openModal(dog);
          grid.appendChild(card);
        });
      }

      function openModal(dog) {
        const genderText = dog.gender === "M" ? "남아" : "여아";

        // 강아지별 상태 태그 생성 (입양가능, 임보가능 등)
        const statusHtml = dog.status
          .map((s) => `<span class="status-badge">${s}</span>`)
          .join("");

        modalBody.innerHTML = `
        <img src="${dog.image}" class="modal-img" onerror="this.src='https://via.placeholder.com/300?text=Dog'">
        <div class="modal-body">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                <div>
                    <h2 style="font-size:24px; font-weight:800;">${dog.name}</h2>
                    <p style="color:#888; font-size:14px;">${dog.age === 0 ? "1살 미만" : dog.age + "살 추정"} · ${genderText} · ${dog.weight}kg</p>
                </div>
                <div style="display:flex; flex-direction:row; gap:5px;">
                    ${statusHtml}
                </div>
            </div>
            <div class="tag-container">
                ${dog.tags.map((tag) => `<span class="tag" style="padding:6px 10px; font-size:11px;"># ${tag}</span>`).join("")}
            </div>
            <div class="modal-desc">
                <p style="font-weight:700; margin-bottom:8px; color:var(--primary-color);">쉼터 아이 소개</p>
                <p>${dog.desc}</p>
            </div>

            <!-- 하단 버튼 배치 -->
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button 
                    onclick="window.location.href='입양_신청_링크'"
                    style="flex:2; background:var(--primary-color); color:white; border:none; padding:16px; border-radius:15px; font-weight:bold; font-size:15px; cursor:pointer;">
                    입양 신청하기
                </button>
            </div>
        </div>
    `;
        modal.classList.add("show");
        document.body.classList.add("no-scroll");
        document.querySelector(".modal-content").scrollTop = 0;
      }

      function closeModal() {
        modal.classList.remove("show");
        document.body.classList.remove("no-scroll");
      }

      closeBtn.onclick = closeModal;
      window.onclick = (e) => {
        if (e.target == modal) closeModal();
      };
      document.addEventListener("DOMContentLoaded", renderCards);
    </script>
  </body>
</html>
